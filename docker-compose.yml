services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 4545:4545
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_BOT_NAME=${DISCORD_BOT_NAME}
      - DISCORD_BOT_ID=${DISCORD_BOT_ID}
      - BOT_PREFIX=${BOT_PREFIX}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - LAVALINK_HOST=${LAVALINK_HOST:-lavalink}
      - LAVALINK_PORT=${LAVALINK_PORT:-2333}
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
      - LAVALINK_SECURE=${LAVALINK_SECURE:-false}
    depends_on:
      lavalink:
        condition: service_healthy

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: nekobot-lavalink
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx512M
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
    volumes:
      - ./server_conf/lavalink/application.yml:/opt/Lavalink/application.yml:ro
    ports:
      - "2333:2333"
    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

